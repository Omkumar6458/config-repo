server:
  port: 8080

spring:
  application:
    name: api-gateway

  profiles:
    active: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/auth-service

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 5
            redis-rate-limiter.burstCapacity: 10

      routes:
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/account/**
          filters:
            - StripPrefix=1

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transaction/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: transactionCircuitBreaker
                fallbackUri: forward:/fallback/transaction

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
