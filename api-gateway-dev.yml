server:
  port: 8080

spring:
  application:
    name: api-gateway

  profiles:
    active: dev

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000   # FIXED

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 5
            redis-rate-limiter.burstCapacity: 10

      routes:
        - id: account-service
          uri: lb://ACCOUNT-SERVICE   # FIXED
          predicates:
            - Path=/api/accounts/**   # FIXED
          filters:
            - StripPrefix=1

        - id: transaction-service
          uri: lb://TRANSACTION-SERVICE   # FIXED
          predicates:
            - Path=/api/transactions/**   # FIXED
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: transactionCircuitBreaker
                fallbackUri: forward:/fallback/transaction

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # ENABLED

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
